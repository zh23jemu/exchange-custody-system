<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 资金管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 60px;
        }
        .container { max-width: 800px; margin: 0 auto; }

        .lang-switch {
            position: fixed; top: 15px; right: 20px;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px; border-radius: 20px;
            display: flex; gap: 8px; z-index: 100;
        }
        .lang-btn {
            padding: 5px 12px; border: none; border-radius: 15px;
            font-size: 12px; cursor: pointer;
            background: transparent; color: white;
        }
        .lang-btn.active { background: white; color: #667eea; }

        .card {
            background: white; border-radius: 16px;
            padding: 25px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { color: white; text-align: center; margin-bottom: 20px; font-size: 28px; }
        h2 { color: #333; margin-bottom: 15px; font-size: 18px; }

        .total-assets {
            text-align: center; color: white;
        }
        .total-assets .amount {
            font-size: 42px; font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .total-assets .label { opacity: 0.9; font-size: 14px; }

        .account-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px; border-radius: 12px;
            margin-bottom: 12px; cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .account-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            border-color: #667eea;
        }
        .account-item.customer { background: #e8f5e9; }
        .account-item.supplier { background: #fff3e0; }
        .account-item.company { background: #e3f2fd; }
        .account-info { display: flex; flex-direction: column; gap: 4px; }
        .account-name { font-weight: 600; color: #333; font-size: 16px; }
        .account-meta { font-size: 12px; color: #666; }
        .account-type {
            font-size: 11px; padding: 4px 10px; border-radius: 12px;
            font-weight: 500;
        }
        .account-type.customer { background: #4caf50; color: white; }
        .account-type.supplier { background: #ff9800; color: white; }
        .account-type.company { background: #2196f3; color: white; }
        .account-balance { font-size: 20px; font-weight: bold; color: #333; }
        .account-balance.negative { color: #f44336; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            padding: 15px; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: #4caf50; color: white; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-secondary { background: #9e9e9e; color: white; }
        .btn-outline { background: white; color: #667eea; border: 2px solid #667eea; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            justify-content: center; align-items: center;
            overflow-y: auto; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; border-radius: 16px; padding: 30px;
            width: 100%; max-width: 400px;
            max-height: 90vh; overflow-y: auto;
        }
        .modal.large { max-width: 500px; }
        .modal h3 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 16px;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #667eea; outline: none;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns .btn { flex: 1; }

        .account-menu { display: flex; flex-direction: column; gap: 12px; }
        .account-menu-item {
            display: flex; align-items: center; gap: 12px;
            padding: 15px; border-radius: 12px;
            cursor: pointer; transition: all 0.3s;
            border: none; background: #f5f5f5;
            font-size: 16px; font-weight: 500;
        }
        .account-menu-item:hover { transform: translateX(5px); }
        .account-menu-item.deposit:hover { background: #e8f5e9; color: #4caf50; }
        .account-menu-item.transfer:hover { background: #e3f2fd; color: #2196f3; }
        .account-menu-item.history:hover { background: #f3e5f5; color: #9c27b0; }
        .account-menu-item .icon { font-size: 24px; }
        .selected-account {
            background: #f0f0f0; padding: 12px 15px;
            border-radius: 10px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .selected-account .name { font-weight: 600; }
        .selected-account .balance { color: #4caf50; font-weight: bold; }

        .transaction-item { padding: 12px; border-bottom: 1px solid #eee; }
        .transaction-item:last-child { border-bottom: none; }
        .trans-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .trans-type { font-weight: 600; }
        .trans-type.deposit { color: #4caf50; }
        .trans-type.withdraw { color: #f44336; }
        .trans-type.transfer { color: #2196f3; }
        .trans-type.payable { color: #ff9800; }
        .trans-amount { font-weight: bold; }
        .trans-time { font-size: 12px; color: #999; }

        .tab-nav {
            display: flex; background: white; border-radius: 10px;
            overflow: hidden; margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none;
            background: #f5f5f5; cursor: pointer; font-size: 14px;
        }
        .tab-btn.active { background: #667eea; color: white; }

        .empty-state { text-align: center; padding: 40px; color: #999; }
        .empty-state .icon { font-size: 48px; margin-bottom: 10px; }

        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: rgba(255,255,255,0.2); border-radius: 10px;
            padding: 15px; text-align: center; color: white;
        }
        .stat-box .num { font-size: 20px; font-weight: bold; }
        .stat-box .txt { font-size: 11px; opacity: 0.9; }

        .payable-badge {
            background: #ff9800; color: white; padding: 2px 8px;
            border-radius: 10px; font-size: 11px; margin-left: 8px;
        }

        .history-list { max-height: 400px; overflow-y: auto; }
        .history-summary {
            background: #f5f5f5; padding: 15px; border-radius: 10px;
            margin-bottom: 15px;
        }
        .history-summary .row {
            display: flex; justify-content: space-between; margin-bottom: 8px;
        }
        .history-summary .row:last-child { margin-bottom: 0; }
        .history-summary .label { color: #666; }
        .history-summary .value { font-weight: 600; }
        .history-summary .value.positive { color: #4caf50; }
        .history-summary .value.negative { color: #f44336; }

        .click-hint { text-align: center; color: #999; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('zh')">中文</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <h1 data-zh="💰 资金管理系统" data-en="💰 Fund Management System">💰 资金管理系统</h1>

        <div class="card total-assets">
            <div class="label" data-zh="总资产 (AUD)" data-en="Total Assets (AUD)">总资产 (AUD)</div>
            <div class="amount" id="totalAssets">$0.00</div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="num" id="customerCount">0</div>
                <div class="txt" data-zh="客户账户" data-en="Customers">客户账户</div>
            </div>
            <div class="stat-box">
                <div class="num" id="supplierCount">0</div>
                <div class="txt" data-zh="供应商" data-en="Suppliers">供应商</div>
            </div>
            <div class="stat-box">
                <div class="num" id="companyCount">0</div>
                <div class="txt" data-zh="公司账户" data-en="Company">公司账户</div>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box" style="background: rgba(255,152,0,0.4);">
                <div class="num" id="totalPayable">$0.00</div>
                <div class="txt" data-zh="应付账款" data-en="Payable">应付账款</div>
            </div>
            <div class="stat-box" style="background: rgba(156,39,176,0.4);">
                <div class="num" id="totalPaid">$0.00</div>
                <div class="txt" data-zh="已还款" data-en="Paid">已还款</div>
            </div>
            <div class="stat-box" style="background: rgba(33,150,243,0.4);">
                <div class="num" id="netBalance">$0.00</div>
                <div class="txt" data-zh="净余额" data-en="Net">净余额</div>
            </div>
        </div>

        <div class="card">
            <div class="btn-group">
                <button class="btn btn-primary" onclick="openModal('account')" data-zh="➕ 新建账户" data-en="➕ New Account">➕ 新建账户</button>
                <button class="btn btn-success" onclick="openModal('deposit')" data-zh="💵 存款" data-en="💵 Deposit">💵 存款</button>
            </div>
            <div class="btn-group" style="margin-top: 10px;">
                <button class="btn btn-warning" onclick="openModal('payable')" data-zh="📋 记应付款" data-en="📋 Add Payable">📋 记应付款</button>
                <button class="btn btn-outline" onclick="openModal('transfer')" data-zh="🔄 转账" data-en="🔄 Transfer">🔄 转账</button>
            </div>
            <div class="btn-group" style="margin-top: 10px;">
                <button class="btn btn-secondary" onclick="exportData()" data-zh="📤 导出" data-en="📤 Export">📤 导出</button>
                <button class="btn btn-secondary" onclick="openModal('import')" data-zh="📥 导入" data-en="📥 Import">📥 导入</button>
            </div>
            <div class="click-hint" data-zh="💡 点击账户查看流水" data-en="💡 Click account to view history">💡 点击账户查看流水</div>
        </div>

        <div class="card">
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('customer')" data-zh="客户" data-en="Customer">客户</button>
                <button class="tab-btn" onclick="switchTab('supplier')" data-zh="供应商" data-en="Supplier">供应商</button>
                <button class="tab-btn" onclick="switchTab('company')" data-zh="公司" data-en="Company">公司</button>
                <button class="tab-btn" onclick="switchTab('all')" data-zh="全部" data-en="All">全部</button>
            </div>
            <div id="accountList"></div>
        </div>

        <div class="card">
            <h2 data-zh="最近交易" data-en="Recent Transactions">最近交易</h2>
            <div id="transactionList"></div>
        </div>
    </div>

    <!-- 新建账户 -->
    <div class="modal" id="modalAccount">
        <div class="modal-content">
            <h3 data-zh="新建账户" data-en="New Account">新建账户</h3>
            <div class="form-group">
                <label data-zh="账户名称" data-en="Name">账户名称</label>
                <input type="text" id="newAccountName" placeholder="如：张三">
            </div>
            <div class="form-group">
                <label data-zh="账户类型" data-en="Type">账户类型</label>
                <select id="newAccountType">
                    <option value="customer" data-zh="客户" data-en="Customer">客户</option>
                    <option value="supplier" data-zh="供应商" data-en="Supplier">供应商</option>
                    <option value="company" data-zh="公司" data-en="Company">公司</option>
                </select>
            </div>
            <div class="modal-btns">
                <button class="btn btn-secondary" onclick="closeModal('account')" data-zh="取消" data-en="Cancel">取消</button>
                <button class="btn btn-primary" onclick="createAccount()" data-zh="创建" data-en="Create">创建</button>
            </div>
        </div>
    </div>

    <!-- 账户操作菜单 -->
    <div class="modal" id="modalAccountAction">
        <div class="modal-content">
            <h3 data-zh="选择操作" data-en="Choose Action">选择操作</h3>
            <div class="selected-account">
                <span class="name" id="selectedAccName">-</span>
                <span class="balance" id="selectedAccBalance">$0.00</span>
            </div>
            <div class="account-menu">
                <button class="account-menu-item deposit" onclick="openDepositFromAccount()">
                    <span class="icon">💵</span>
                    <span data-zh="存款" data-en="Deposit">存款</span>
                </button>
                <button class="account-menu-item transfer" onclick="openTransferFromAccount()">
                    <span class="icon">🔄</span>
                    <span data-zh="转账" data-en="Transfer">转账</span>
                </button>
                <button class="account-menu-item history" onclick="showAccountHistory()">
                    <span class="icon">📜</span>
                    <span data-zh="查看流水" data-en="View History">查看流水</span>
                </button>
            </div>
            <div class="modal-btns">
                <button class="btn btn-secondary" onclick="closeModal('accountAction')" data-zh="关闭" data-en="Close">关闭</button>
            </div>
        </div>
    </div>

    <!-- 账户流水 -->
    <div class="modal large" id="modalHistory">
        <div class="modal-content">
            <h3 data-zh="账户流水" data-en="Account History">账户流水</h3>
            <div class="history-summary" id="historySummary"></div>
            <div class="history-list" id="historyList"></div>
            <div class="modal-btns">
                <button class="btn btn-secondary" onclick="closeModal('history')" data-zh="关闭" data-en="Close">关闭</button>
            </div>
        </div>
    </div>

    <!-- 存款 -->
    <div class="modal" id="modalDeposit">
        <div class="modal-content">
            <h3 data-zh="存款" data-en="Deposit">存款</h3>
            <div class="form-group">
                <label data-zh="选择账户" data-en="Account">选择账户</label>
                <select id="depositAccount"></select>
            </div>
            <div class="form-group">
                <label data-zh="金额 (AUD)" data-en="Amount">金额 (AUD)</label>
                <input type="number" id="depositAmount" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
                <label data-zh="备注" data-en="Note">备注</label>
                <input type="text" id="depositNote" placeholder="可选">
            </div>
            <div class="modal-btns">
                <button class="btn btn-secondary" onclick="closeModal('deposit')" data-zh="取消" data-en="Cancel">取消</button>
                <button class="btn btn-success" onclick="doDeposit()" data-zh="确认" data-en="Confirm">确认</button>
            </div>
        </div>
    </div>

    <!-- 应付款 -->
    <div class="modal" id="modalPayable">
        <div class="modal-content">
            <h3 data-zh="记录应付款" data-en="Record Payable">记录应付款</h3>
            <p style="color: #666; font-size: 13px; margin-bottom: 15px;" data-zh="记录我们欠别人的款项" data-en="Record money we owe">记录我们欠别人的款项</p>
            <div class="form-group">
                <label data-zh="欠谁" data-en="Owe To">欠谁</label>
                <select id="payableTo"></select>
            </div>
            <div class="form-group">
                <label data-zh="金额 (AUD)" data-en="Amount">金额 (AUD)</label>
                <input type="number" id="payableAmount" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
                <label data-zh="原因" data-en="Reason">原因</label>
                <input type="text" id="payableReason" placeholder="如：代收款项">
            </div>
            <div class="modal-btns">
                <button class="btn btn-secondary" onclick="closeModal('payable')" data-zh="取消" data-en="Cancel">取消</button>
                <button class="btn btn-warning" onclick="doAddPayable()" data-zh="确认" data-en="Confirm">确认</button>
            </div>
        </div>
    </div>

    <!-- 转账 -->
    <div class="modal" id="modalTransfer">
        <div class="modal-content">
            <h3 data-zh="转账" data-en="Transfer">转账</h3>
            <div class="form-group">
                <label data-zh="从" data-en="From">从</label>
                <select id="transferFrom"></select>
            </div>
            <div class="form-group">
                <label data-zh="到" data-en="To">到</label>
                <select id="transferTo"></select>
            </div>
            <div class="form-group">
                <label data-zh="金额 (AUD)" data-en="Amount">金额 (AUD)</label>
                <input type="number" id="transferAmount" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
                <label data-zh="备注" data-en="Note">备注</label>
                <input type="text" id="transferNote" placeholder="可选">
            </div>
            <div class="modal-btns">
                <button class="btn btn-secondary" onclick="closeModal('transfer')" data-zh="取消" data-en="Cancel">取消</button>
                <button class="btn btn-primary" onclick="doTransfer()" data-zh="确认" data-en="Confirm">确认</button>
            </div>
        </div>
    </div>

    <!-- 导入 -->
    <div class="modal" id="modalImport">
        <div class="modal-content">
            <h3 data-zh="导入数据" data-en="Import Data">导入数据</h3>
            <div class="form-group">
                <textarea id="importData" rows="6" placeholder='{"accounts":[...]}' style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;resize:vertical;"></textarea>
            </div>
            <div class="modal-btns">
                <button class="btn btn-secondary" onclick="closeModal('import')" data-zh="取消" data-en="Cancel">取消</button>
                <button class="btn btn-primary" onclick="importData()" data-zh="导入" data-en="Import">导入</button>
            </div>
        </div>
    </div>

    <script>
        let accounts = JSON.parse(localStorage.getItem('fundAccounts')) || [];
        let transactions = JSON.parse(localStorage.getItem('fundTransactions')) || [];
        let payables = JSON.parse(localStorage.getItem('fundPayables')) || [];
        let currentLang = localStorage.getItem('fundLang') || 'zh';
        let currentTab = 'customer';
        let selectedAccountId = null;

        function init() {
            if (accounts.length === 0) {
                accounts = [
                    { id: 1, name: '客户 1', type: 'customer', balance: 0 },
                    { id: 2, name: '客户 2', type: 'customer', balance: 0 },
                    { id: 3, name: '供应商 A', type: 'supplier', balance: 0 },
                    { id: 4, name: '公司运营', type: 'company', balance: 0 },
                ];
                saveData();
            }
            renderAll();
            applyLang();
        }

        function saveData() {
            localStorage.setItem('fundAccounts', JSON.stringify(accounts));
            localStorage.setItem('fundTransactions', JSON.stringify(transactions));
            localStorage.setItem('fundPayables', JSON.stringify(payables));
        }

        function renderAll() {
            renderStats();
            renderAccounts();
            renderTransactions();
        }

        function renderStats() {
            const total = accounts.reduce((sum, acc) => sum + acc.balance, 0);
            document.getElementById('totalAssets').textContent = '$' + total.toFixed(2);
            document.getElementById('customerCount').textContent = accounts.filter(a => a.type === 'customer').length;
            document.getElementById('supplierCount').textContent = accounts.filter(a => a.type === 'supplier').length;
            document.getElementById('companyCount').textContent = accounts.filter(a => a.type === 'company').length;

            const totalPayable = payables.filter(p => !p.paid).reduce((sum, p) => sum + p.amount, 0);
            const totalPaid = payables.filter(p => p.paid).reduce((sum, p) => sum + p.amount, 0);
            document.getElementById('totalPayable').textContent = '$' + totalPayable.toFixed(2);
            document.getElementById('totalPaid').textContent = '$' + totalPaid.toFixed(2);
            document.getElementById('netBalance').textContent = '$' + (total - totalPayable).toFixed(2);
        }

        function renderAccounts() {
            const list = document.getElementById('accountList');
            let filtered = currentTab === 'all' ? accounts : accounts.filter(a => a.type === currentTab);

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div data-zh="暂无账户" data-en="No accounts">暂无账户</div></div>`;
                return;
            }

            const typeLabel = {
                customer: { zh: '客户', en: 'Customer' },
                supplier: { zh: '供应商', en: 'Supplier' },
                company: { zh: '公司', en: 'Company' }
            };

            list.innerHTML = filtered.map(acc => {
                const accPayables = payables.filter(p => p.accountId === acc.id && !p.paid);
                const payableTotal = accPayables.reduce((sum, p) => sum + p.amount, 0);
                const balanceClass = acc.balance < 0 ? 'negative' : '';

                return `
                    <div class="account-item ${acc.type}" onclick="showAccountAction(${acc.id})">
                        <div class="account-info">
                            <div>
                                <span class="account-name">${acc.name}</span>
                                <span class="account-type ${acc.type}">${typeLabel[acc.type][currentLang]}</span>
                                ${payableTotal > 0 ? `<span class="payable-badge">-${payableTotal.toFixed(2)}</span>` : ''}
                            </div>
                            <div class="account-meta" data-zh="应付: $" data-en="Payable: $">应付: $${payableTotal.toFixed(2)}</div>
                        </div>
                        <div class="account-balance ${balanceClass}">$${acc.balance.toFixed(2)}</div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.account-meta').forEach(el => {
                const text = el.getAttribute(`data-${currentLang}`);
                if (text) el.textContent = text;
            });
        }

        function showAccountAction(accountId) {
            selectedAccountId = accountId;
            const acc = accounts.find(a => a.id === accountId);
            if (acc) {
                document.getElementById('selectedAccName').textContent = acc.name;
                document.getElementById('selectedAccBalance').textContent = '$' + acc.balance.toFixed(2);
                document.getElementById('modalAccountAction').classList.add('active');
            }
        }

        function openDepositFromAccount() {
            closeModal('accountAction');
            openModal('deposit');
            document.getElementById('depositAccount').value = selectedAccountId;
        }

        function openTransferFromAccount() {
            closeModal('accountAction');
            openModal('transfer');
            document.getElementById('transferFrom').value = selectedAccountId;
        }

        function showAccountHistory() {
            closeModal('accountAction');
            const acc = accounts.find(a => a.id === selectedAccountId);
            if (!acc) return;

            const accTransactions = transactions.filter(t =>
                t.accountId === selectedAccountId || t.fromId === selectedAccountId || t.toId === selectedAccountId
            );

            const totalIn = accTransactions.filter(t => t.accountId === selectedAccountId || t.toId === selectedAccountId).reduce((sum, t) => sum + t.amount, 0);
            const totalOut = accTransactions.filter(t => t.fromId === selectedAccountId).reduce((sum, t) => sum + t.amount, 0);
            const accPayables = payables.filter(p => p.accountId === selectedAccountId && !p.paid).reduce((sum, p) => sum + p.amount, 0);

            document.getElementById('historySummary').innerHTML = `
                <div class="row"><span class="label" data-zh="账户" data-en="Account">账户</span><span class="value">${acc.name}</span></div>
                <div class="row"><span class="label" data-zh="余额" data-en="Balance">余额</span><span class="value ${acc.balance >= 0 ? 'positive' : 'negative'}">$${acc.balance.toFixed(2)}</span></div>
                <div class="row"><span class="label" data-zh="应付" data-en="Payable">应付</span><span class="value negative">$${accPayables.toFixed(2)}</span></div>
                <div class="row"><span class="label" data-zh="交易笔数" data-en="Transactions">交易笔数</span><span class="value">${accTransactions.length}</span></div>
            `;

            if (accTransactions.length === 0) {
                document.getElementById('historyList').innerHTML = `<div class="empty-state"><div class="icon">📝</div><div data-zh="暂无交易" data-en="No transactions">暂无交易</div></div>`;
            } else {
                document.getElementById('historyList').innerHTML = accTransactions.reverse().map(t => `
                    <div class="transaction-item">
                        <div class="trans-header">
                            <span class="trans-type ${t.type}">${getTransTypeName(t.type)}</span>
                            <span class="trans-amount" style="color: ${['withdraw','payable'].includes(t.type) ? '#f44336' : '#4caf50'}">
                                ${['withdraw','payable'].includes(t.type) ? '-' : '+'}$${t.amount.toFixed(2)}
                            </span>
                        </div>
                        <div class="trans-time">${t.fromName || ''} ${t.fromName && t.toName ? '→' : ''} ${t.toName || ''} ${t.note ? '| ' + t.note : ''} | ${formatTime(t.time)}</div>
                    </div>
                `).join('');
            }

            openModal('history');
            applyLang();
        }

        function renderTransactions() {
            const list = document.getElementById('transactionList');
            const recent = transactions.slice(-10).reverse();

            if (recent.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="icon">📝</div><div data-zh="暂无交易" data-en="No transactions">暂无交易</div></div>`;
                return;
            }

            list.innerHTML = recent.map(t => `
                <div class="transaction-item">
                    <div class="trans-header">
                        <span class="trans-type ${t.type}">${getTransTypeName(t.type)}</span>
                        <span class="trans-amount" style="color: ${['withdraw','payable'].includes(t.type) ? '#f44336' : '#4caf50'}">
                            ${['withdraw','payable'].includes(t.type) ? '-' : '+'}$${t.amount.toFixed(2)}
                        </span>
                    </div>
                    <div class="trans-time">${t.fromName || ''} ${t.fromName && t.toName ? '→' : ''} ${t.toName || ''} ${t.note ? '| ' + t.note : ''} | ${formatTime(t.time)}</div>
                </div>
            `).join('');
        }

        function getTransTypeName(type) {
            const names = {
                deposit: { zh: '💵 存款', en: '💵 Deposit' },
                withdraw: { zh: '💸 取款', en: '💸 Withdraw' },
                transfer: { zh: '🔄 转账', en: '🔄 Transfer' },
                payable: { zh: '📋 应付', en: '📋 Payable' }
            };
            return names[type]?.[currentLang] || type;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes({
                    customer: currentLang === 'zh' ? '客户' : 'Customer',
                    supplier: currentLang === 'zh' ? '供应商' : 'Supplier',
                    company: currentLang === 'zh' ? '公司' : 'Company',
                    all: currentLang === 'zh' ? '全部' : 'All'
                }[tab]));
            });
            renderAccounts();
        }

        function openModal(type) {
            document.getElementById('modal' + capitalize(type)).classList.add('active');
            if (type === 'deposit' || type === 'transfer') populateAccountSelects();
            if (type === 'payable') populatePayableSelects();
        }

        function closeModal(type) {
            document.getElementById('modal' + capitalize(type)).classList.remove('active');
            clearForm(type);
        }

        function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

        function clearForm(type) {
            if (type === 'account') document.getElementById('newAccountName').value = '';
            else if (type === 'deposit') { document.getElementById('depositAmount').value = ''; document.getElementById('depositNote').value = ''; }
            else if (type === 'transfer') { document.getElementById('transferAmount').value = ''; document.getElementById('transferNote').value = ''; }
            else if (type === 'payable') { document.getElementById('payableAmount').value = ''; document.getElementById('payableReason').value = ''; }
        }

        function populateAccountSelects() {
            const options = accounts.map(a => `<option value="${a.id}">${a.name} ($${a.balance.toFixed(2)})</option>`).join('');
            document.getElementById('depositAccount').innerHTML = options;
            document.getElementById('transferFrom').innerHTML = options;
            document.getElementById('transferTo').innerHTML = options;
        }

        function populatePayableSelects() {
            const options = accounts.filter(a => a.type === 'customer' || a.type === 'supplier').map(a => `<option value="${a.id}">${a.name}</option>`).join('');
            document.getElementById('payableTo').innerHTML = options;
        }

        function createAccount() {
            const name = document.getElementById('newAccountName').value.trim();
            const type = document.getElementById('newAccountType').value;
            if (!name) { alert(currentLang === 'zh' ? '请输入名称' : 'Please enter name'); return; }
            const newId = accounts.length > 0 ? Math.max(...accounts.map(a => a.id)) + 1 : 1;
            accounts.push({ id: newId, name, type, balance: 0 });
            saveData(); renderAll(); closeModal('account');
        }

        function doDeposit() {
            const id = parseInt(document.getElementById('depositAccount').value);
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const note = document.getElementById('depositNote').value.trim();
            if (!amount || amount <= 0) { alert(currentLang === 'zh' ? '请输入金额' : 'Please enter amount'); return; }
            const acc = accounts.find(a => a.id === id);
            if (acc) {
                acc.balance += amount;
                transactions.push({ type: 'deposit', accountId: id, accountName: acc.name, amount, note, time: Date.now() });
                saveData(); renderAll(); closeModal('deposit');
            }
        }

        function doAddPayable() {
            const accountId = parseInt(document.getElementById('payableTo').value);
            const amount = parseFloat(document.getElementById('payableAmount').value);
            const reason = document.getElementById('payableReason').value.trim();
            if (!amount || amount <= 0) { alert(currentLang === 'zh' ? '请输入金额' : 'Please enter amount'); return; }
            const acc = accounts.find(a => a.id === accountId);
            if (acc) {
                payables.push({ id: Date.now(), accountId, accountName: acc.name, amount, reason, time: Date.now(), paid: false });
                acc.balance -= amount;
                transactions.push({ type: 'payable', accountId, accountName: acc.name, amount, note: reason || (currentLang === 'zh' ? '应付账款' : 'Payable'), time: Date.now() });
                saveData(); renderAll(); closeModal('payable');
            }
        }

        function doTransfer() {
            const fromId = parseInt(document.getElementById('transferFrom').value);
            const toId = parseInt(document.getElementById('transferTo').value);
            const amount = parseFloat(document.getElementById('transferAmount').value);
            const note = document.getElementById('transferNote').value.trim();
            if (fromId === toId) { alert(currentLang === 'zh' ? '不能给自己转账' : 'Cannot transfer to same account'); return; }
            if (!amount || amount <= 0) { alert(currentLang === 'zh' ? '请输入金额' : 'Please enter amount'); return; }
            const fromAcc = accounts.find(a => a.id === fromId);
            const toAcc = accounts.find(a => a.id === toId);
            if (fromAcc && toAcc && fromAcc.balance >= amount) {
                fromAcc.balance -= amount;
                toAcc.balance += amount;
                transactions.push({ type: 'transfer', fromId, toId, fromName: fromAcc.name, toName: toAcc.name, amount, note, time: Date.now() });
                saveData(); renderAll(); closeModal('transfer');
            } else {
                alert(currentLang === 'zh' ? '余额不足' : 'Insufficient balance');
            }
        }

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('fundLang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === (lang === 'zh' ? '中文' : 'EN'));
            });
            applyLang(); renderAccounts(); renderTransactions();
        }

        function applyLang() {
            document.querySelectorAll('[data-zh]').forEach(el => {
                const text = el.getAttribute(`data-${currentLang}`);
                if (text) el.textContent = text;
            });
        }

        function exportData() {
            const data = { accounts, transactions, payables, exportTime: new Date().toISOString() };
            const jsonStr = JSON.stringify(data, null, 2);
            navigator.clipboard.writeText(jsonStr).then(() => {
                alert(currentLang === 'zh' ? '✅ 已复制！' : '✅ Copied!');
            }).catch(() => {
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'fund_data.json'; a.click();
            });
        }

        function importData() {
            const input = document.getElementById('importData').value.trim();
            if (!input) { alert(currentLang === 'zh' ? '请粘贴数据' : 'Please paste data'); return; }
            try {
                const data = JSON.parse(input);
                if (confirm(currentLang === 'zh' ? '⚠️ 导入将覆盖数据！' : '⚠️ Import will overwrite data!')) {
                    accounts = data.accounts || [];
                    transactions = data.transactions || [];
                    payables = data.payables || [];
                    saveData(); renderAll(); closeModal('import');
                    alert(currentLang === 'zh' ? '✅ 导入成功！' : '✅ Import successful!');
                }
            } catch (e) {
                alert(currentLang === 'zh' ? '❌ 格式错误' : '❌ Invalid format');
            }
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
        });

        init();
    </script>
</body>
</html>
